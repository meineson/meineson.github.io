<body x-data="videoConferenceApp()" x-cloak class="h-screen w-screen bg-[#11141a] text-gray-100 overflow-hidden font-sans">

  <!-- 主容器 -->
  <div class="flex flex-col h-screen min-w-80 min-h-120">

    <!-- 顶部导航栏 -->
    <header class="w-full h-14 min-h-14 bg-[#101319] flex items-center justify-between px-4 lg:px-6 shrink-0">
      <div class="flex items-center gap-4 lg:gap-6">
        <div class="text-base lg:text-xl font-bold whitespace-nowrap">🔗 连接会议</div>
        <div class="text-xs lg:text-sm text-gray-400 whitespace-nowrap hidden sm:block">会议号: <span x-text="meetingId"></span></div>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-xs lg:text-sm font-medium text-green-400 flex items-center gap-1.5 whitespace-nowrap">
          <span class="animate-pulse-custom">●</span>
          <span x-text="formatTime(callDuration)"></span>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <div class="flex flex-1 overflow-hidden">

      <!-- 视频区域 -->
      <div class="flex-1 min-w-0 bg-[#0c0f14] flex flex-col p-3 lg:p-6">

        <!-- 主视频 -->
        <div class="flex-1 min-h-0 bg-gradient-to-r from-[#664d33] to-[#33261a] rounded-lg lg:rounded-xl relative overflow-hidden">

          <!-- 远程用户头像 -->
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
            <div class="w-16 h-16 sm:w-20 sm:h-20 lg:w-28 lg:h-28 rounded-full bg-[#4d6680]/30 flex items-center justify-center text-3xl sm:text-4xl lg:text-5xl">
              👤
            </div>
          </div>

          <!-- 本地视频预览 -->
          <div class="absolute top-2 right-2 lg:top-5 lg:right-5 w-40 h-24 sm:w-56 sm:h-32 lg:w-80 lg:h-44 bg-gradient-to-r from-[#26404d] to-[#0d1a26] border-2 border-green-500 rounded-lg lg:rounded-xl flex flex-col items-center justify-center">
            <div class="w-8 h-8 sm:w-12 sm:h-12 lg:w-16 lg:h-16 rounded-full bg-[#405966]/30 flex items-center justify-center text-sm sm:text-lg lg:text-2xl">👤</div>
            <div class="flex gap-1.5 lg:gap-2 mt-1 lg:mt-2">
              <div class="w-5 h-4 lg:w-6 lg:h-5 bg-black/60 border border-white/30 rounded flex items-center justify-center text-xs lg:text-sm" :class="micMuted ? 'bg-red-500/60' : ''">
                <span x-text="micMuted ? '🔇' : '🎤'"></span>
              </div>
              <div class="w-5 h-4 lg:w-6 lg:h-5 bg-black/60 border border-white/30 rounded flex items-center justify-center text-xs lg:text-sm" :class="cameraOff ? 'bg-red-500/60' : ''">
                <span x-text="cameraOff ? '📵' : '📷'"></span>
              </div>
            </div>
            <div class="absolute bottom-2 lg:bottom-4 left-1/2 -translate-x-1/2 text-xs lg:text-base font-medium">我</div>
          </div>

          <!-- 说话者名称 -->
          <div class="absolute bottom-4 lg:bottom-6 left-5 lg:left-10 bg-black/70 px-2.5 lg:px-5 py-1.5 lg:py-2 rounded-lg flex items-center gap-2">
            <span class="text-xs lg:text-base font-medium whitespace-nowrap">👤 <span x-text="currentSpeaker"></span></span>
          </div>

          <!-- 状态徽章 -->
          <div class="absolute bottom-12 lg:bottom-16 left-5 lg:left-10 flex gap-1.5 lg:gap-2">
            <div class="w-7 h-6 lg:w-9 lg:h-7 bg-black/60 border border-white/30 rounded-md flex items-center justify-center text-sm lg:text-base">🎤</div>
            <div class="w-7 h-6 lg:w-9 lg:h-7 bg-black/60 border border-white/30 rounded-md flex items-center justify-center text-sm lg:text-base">📷</div>
          </div>
        </div>

        <!-- 参与者缩略图 -->
        <div class="h-14 lg:h-[72px] min-h-14 bg-[#101319] flex items-center gap-2 lg:gap-4 px-1 lg:px-2 mt-2 lg:mt-4 overflow-x-auto shrink-0">
          <template x-for="(participant, index) in participants" :key="participant.id">
            <div class="w-16 h-10 lg:w-24 lg:h-14 min-w-16 lg:min-w-24 bg-[#191e26] rounded-lg flex items-center justify-center text-sm lg:text-lg cursor-pointer hover:bg-[#232a36] transition-all shrink-0" :class="{'border-2 border-green-500': participant.speaking}">
              <span>👤</span>
            </div>
          </template>
          <div class="text-xs lg:text-sm font-medium shrink-0" x-show="participants.length > 5">
            +<span x-text="participants.length - 5"></span> 人
          </div>
        </div>
      </div>

      <!-- 侧边栏 -->
      <aside class="w-72 lg:w-96 min-w-72 lg:min-w-96 bg-[#101319] flex flex-col">
        <div class="px-4 lg:px-6 py-3 lg:py-5 text-base lg:text-lg font-semibold">💬 聊天</div>

        <!-- 聊天消息 -->
        <div class="flex-1 bg-[#13171e] p-3 lg:p-4 overflow-y-auto min-h-0">
          <template x-for="message in messages" :key="message.id">
            <div class="bg-[#191e26] rounded-lg p-2.5 lg:p-4 mb-2">
              <div class="text-xs lg:text-sm font-semibold mb-1" x-text="message.sender"></div>
              <div class="text-xs text-gray-400" x-text="message.text"></div>
            </div>
          </template>
        </div>

        <!-- 消息输入 -->
        <div class="bg-[#191e26] border border-gray-600 rounded-lg m-3 lg:m-4 px-3 lg:px-4 h-10 lg:h-10 flex items-center shrink-0">
          <input type="text"
                 class="flex-1 bg-transparent border-none outline-none text-gray-100 text-xs lg:text-sm placeholder:text-gray-500"
                 placeholder="输入消息..."
                 x-model="newMessage"
                 @keyup.enter="sendMessage">
        </div>
      </aside>
    </div>

    <!-- 控制栏 -->
    <div class="w-full h-20 lg:h-24 min-h-20 bg-[#13171e] flex items-center justify-center shrink-0">
      <div class="flex items-center gap-1 lg:gap-2 bg-[#28303c] p-1.5 lg:p-2 rounded-lg lg:rounded-xl">
        <button class="w-10 h-10 lg:w-12 lg:h-12 bg-gray-600 border-none rounded-lg text-base lg:text-xl cursor-pointer hover:bg-gray-500 hover:scale-105 transition-all flex items-center justify-center" :class="micMuted ? 'bg-pink-600' : ''" @click="toggleMic" title="麦克风">
          <span x-text="micMuted ? '🔇' : '🎤'"></span>
        </button>
        <button class="w-10 h-10 lg:w-12 lg:h-12 bg-gray-600 border-none rounded-lg text-base lg:text-xl cursor-pointer hover:bg-gray-500 hover:scale-105 transition-all flex items-center justify-center" :class="cameraOff ? 'bg-pink-600' : ''" @click="toggleCamera" title="摄像头">
          <span x-text="cameraOff ? '📵' : '📷'"></span>
        </button>
        <button class="w-10 h-10 lg:w-12 lg:h-12 bg-gray-600 border-none rounded-lg text-base lg:text-xl cursor-pointer hover:bg-gray-500 hover:scale-105 transition-all flex items-center justify-center" :class="screenSharing ? 'bg-green-500' : ''" @click="toggleScreenShare" title="屏幕共享">
          🖥️
        </button>
        <button class="w-10 h-10 lg:w-12 lg:h-12 bg-gray-600 border-none rounded-lg text-base lg:text-xl cursor-pointer hover:bg-gray-500 hover:scale-105 transition-all flex items-center justify-center" title="聊天">
          💬
        </button>
        <button class="w-10 h-10 lg:w-12 lg:h-12 bg-gray-600 border-none rounded-lg text-base lg:text-xl cursor-pointer hover:bg-gray-500 hover:scale-105 transition-all flex items-center justify-center" title="参与者">
          👥
        </button>
        <button class="w-16 h-10 lg:w-20 lg:h-12 bg-pink-600 border-none rounded-lg text-gray-100 text-xs lg:text-sm font-semibold cursor-pointer hover:bg-pink-500 hover:scale-105 transition-all ml-1 lg:ml-2" @click="endCall">结束</button>
      </div>
    </div>
  </div>

  <!-- Alpine.js 应用逻辑 -->
  <script>
    function videoConferenceApp() {
      return {
        meetingId: '847-293-156',
        callDuration: 1965,
        micMuted: false,
        cameraOff: false,
        screenSharing: false,
        currentSpeaker: '陈婷婷',
        newMessage: '',
        participants: [
          { id: 1, name: '陈婷婷', speaking: true },
          { id: 2, name: '张三', speaking: false },
          { id: 3, name: '李四', speaking: false },
          { id: 4, name: '王五', speaking: false },
          { id: 5, name: '赵六', speaking: false },
          { id: 6, name: '孙七', speaking: false },
          { id: 7, name: '周八', speaking: false },
          { id: 8, name: '吴九', speaking: false },
        ],
        messages: [
          { id: 1, sender: '陈婷婷', text: '大家能看到我的屏幕吗？' },
          { id: 2, sender: '张三', text: '可以，很清晰！👍' },
          { id: 3, sender: '我', text: '我想问一下第5页的问题' },
        ],
        formatTime(seconds) {
          const h = Math.floor(seconds / 3600)
          const m = Math.floor((seconds % 3600) / 60)
          const s = seconds % 60
          if (h > 0) {
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`
          }
          return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`
        },
        toggleMic() { this.micMuted = !this.micMuted },
        toggleCamera() { this.cameraOff = !this.cameraOff },
        toggleScreenShare() { this.screenSharing = !this.screenSharing },
        sendMessage() {
          if (this.newMessage.trim()) {
            this.messages.push({ id: this.messages.length + 1, sender: '我', text: this.newMessage })
            this.newMessage = ''
          }
        },
        endCall() {
          if (confirm('确定要结束通话吗？')) alert('通话已结束')
        },
        init() {
          setInterval(() => this.callDuration++, 1000)
          setInterval(() => {
            this.participants.forEach(p => p.speaking = false)
            const idx = Math.floor(Math.random() * this.participants.length)
            this.participants[idx].speaking = true
            this.currentSpeaker = this.participants[idx].name
          }, 5000)
        }
      }
    }
  </script>
